name: Integration Tests

# Run when code that affects repository logic, tests, or security rules changes.
# Skipped automatically on PRs that only touch docs, UI, or l10n files.
on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'lib/repositories/**'
      - 'lib/models/**'
      - 'lib/services/**'
      - 'integration_test/**'
      - 'firestore.rules'
      - 'firebase.json'

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Java is required by the Firestore emulator binary.
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # Cache the emulator JARs so they are only downloaded once per firebase.json change.
      - name: Cache Firebase emulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ hashFiles('firebase.json') }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      # Start the emulator in the background. --project demo-test uses Firebase's
      # demo-project prefix so no real Firebase credentials are needed in CI.
      - name: Start Firebase emulators
        run: firebase emulators:start --only auth,firestore --project demo-test &

      # Poll until both emulator ports are accepting connections before running tests.
      - name: Wait for emulators to be ready
        run: |
          timeout 60 bash -c 'until (echo > /dev/tcp/localhost/8080) 2>/dev/null; do echo "waiting for Firestore..."; sleep 3; done'
          timeout 60 bash -c 'until (echo > /dev/tcp/localhost/9099) 2>/dev/null; do echo "waiting for Auth..."; sleep 3; done'
          echo "Emulators ready"

      # Tests run on Chrome (-d chrome / web) because FlutterFire does not support
      # the Linux desktop target. The web Firebase SDK is used for Firestore/Auth.
      # Running flutter directly (not via emulators:exec) keeps test output visible
      # in the Actions log.
      - name: Run integration tests
        run: flutter test integration_test/all_tests.dart -d chrome --reporter expanded