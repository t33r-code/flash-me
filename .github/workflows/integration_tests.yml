name: Integration Tests

# Run when code that affects repository logic, tests, or security rules changes.
# Skipped automatically on PRs that only touch docs, UI, or l10n files.
on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'lib/repositories/**'
      - 'lib/models/**'
      - 'lib/services/**'
      - 'integration_test/**'
      - 'firestore.rules'
      - 'firebase.json'

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Java is required by the Firestore emulator binary.
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # Cache the emulator JARs so they are only downloaded once per firebase.json change.
      - name: Cache Firebase emulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ hashFiles('firebase.json') }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      # `firebase emulators:exec` starts the emulator, runs the command, then shuts
      # it down. --project demo-test uses Firebase's demo-project prefix so no
      # real Firebase credentials are needed in CI.
      # Tests run on Chrome (-d chrome / web) because FlutterFire does not support
      # the Linux desktop target. The web Firebase SDK is used for Firestore/Auth.
      - name: Run integration tests
        run: |
          firebase emulators:exec \
            --only auth,firestore \
            --project demo-test \
            "flutter test integration_test/all_tests.dart -d chrome --reporter expanded"