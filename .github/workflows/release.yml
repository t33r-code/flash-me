name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-to-play-store:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Decode the upload keystore from secrets and write key.properties.
      # Secrets required: KEYSTORE_BASE64, KEY_ALIAS, KEY_PASSWORD, STORE_PASSWORD
      - name: Configure signing
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../upload-keystore.jks
          EOF

      - name: Build release AAB
        run: flutter build appbundle --release

      # Upload the signed AAB to the Play Store internal testing track.
      # Secret required: PLAY_SERVICE_ACCOUNT_JSON (contents of the service account JSON file)
      - name: Upload to Play Store (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.t33r.agora
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal